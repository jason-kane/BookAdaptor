  <!-- custom theme overrides -->
  <style>
    :root {
      --wa-font-family-body: Figtree, sans-serif;
      --wa-font-family-heading: Figtree, sans-serif;
      --wa-font-family-code: "Chivo Mono", monospace;
      --wa-font-family-longform: Fraunces, serif;
      --wa-font-weight-body: 400;
      --wa-font-weight-heading: 800;
      --wa-font-weight-code: 400;
      --wa-font-weight-longform: 350;
      --wa-border-radius-scale: 1.33;
      --wa-border-width-scale: 1;
      --wa-space-scale: 1.125;
    }
  </style>

  <style>

    .chapter-card {
        border: 3px solid #410f80;
        cursor: pointer;
    }
    .chapter-card:hover {
        border-color: #ff00ff;  
    }
    .broken-badge {
        background-color: #000000;
        color: #ffffff;
        position: absolute;
        right: -3px;
        top: -2px;        
    }    
    .beta-badge {
        background-color: #ff0000;
        color: #ffffff;
        position: absolute;
        right: -3px;
        top: -2px;        
    }
    .module-container {
        position: relative;
        height: 20em;
        width: 15em;
    }
    .label {
        font-weight: bold;
        width: 5em;
    }
    .module-container:hover {
        background-color: #333333;
        border-color: white;
    }    
  </style>

  <script>
    function beforeRequest(obj, event) {
      obj.setAttribute('loading', '');
    }
    function afterRequest(obj, event) {
      obj.removeAttribute('loading');
      htmx.process(obj);
    }
    function showAdvanced() {
      const advanced = document.getElementById("advanced");
      advanced.style.display = "block";

      advanced_button = document.getElementById("advanced-button");
      advanced_button.onclick = hideAdvanced;
      advanced_button.innerText = "Hide Advanced";
      advanced_button.appearance = "filled";
    }
    function hideAdvanced() {
      const advanced = document.getElementById("advanced");
      advanced.style.display = "none";

      advanced_button = document.getElementById("advanced-button");
      advanced_button.onclick = showAdvanced;
      advanced_button.innerText = "Advanced";
      advanced_button.appearance = "outlined";
    }
    function get_pixel(axis, obj, event) {
      if (axis === 'x') {
        return obj.offsetX;
      } else if (axis === 'y') {
        return obj.offsetY;
      }
    }
  </script>
  <title>Home</title>
</head>
