# --- Global Context ---
user  nginx;
worker_processes  8; # Automatically adjusts to available CPU cores
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

# --- Events Context ---
events {
    worker_connections  1024; # Max simultaneous connections per worker
}


# --- HTTP Context ---
http {
    include       /etc/nginx/mime.types; # Handles file extensions
    default_type  application/octet-stream;

    sendfile        on; # Optimizes file delivery
    keepalive_timeout  65;

    # --- Server Block (Virtual Host) ---
    server {
        listen       80;
        server_name  localhost; # Your domain or IP here

        # Custom error page for 404s
        error_page  404              /404.html;
        
        # Redirect server errors to static page
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }

        # 1. Serve static files directly
        location /static/ {
            alias /var/www/static/;
        }

        # 2. Proxy everything else to Flask
        location / {
            proxy_pass http://artifactserver:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }        
       
    }
}
